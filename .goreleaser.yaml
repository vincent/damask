version: 2

project_name: damask

builds:

  - id: damask-admin
    main: ./cmd/admin
    goarch:
      - amd64
      - arm
      - arm64

  - id: damask-server
    main: ./cmd/server
    goarch:
      - amd64
      - arm
      - arm64

  - id: damask-server-demo
    main: ./cmd/server
    tags:
      - demo
    goarch:
      - amd64
      - arm
      - arm64

archives:

  - id: damask-windows
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["zip", "tar.gz"]
    wrap_in_directory: true
    files:
      - LICENSE
      - README.md
    ids:
      - damask-admin
      - damask-server
      - damask-server-demo

dockers_v2:

  - id: damask
    ids:
      - damask-server
      - damask-server-demo
      - damask-admin
    images:
      - "vincent/damask"
    tags:
      - "v{{ .Version }}"
      - "{{ if .IsNightly }}nightly{{ end }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    labels:
      "org.opencontainers.image.description": "Damask is a self-hosted DAM / file sharing and synchronization server."
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    platforms:
      - linux/amd64
      - linux/arm64
