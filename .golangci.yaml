version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        - strings.Builder.WriteString
  exclusions:
    rules:
      - source: "^\\s*defer\\s+"
        linters:
          - errcheck
      - path: .*_test.go
        linters:
          - errcheck

run:
  timeout: 5m
  exclude-dirs:
    - cmd/server/web/node_modules
