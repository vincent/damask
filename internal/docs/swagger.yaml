      - Workspace
    put:
      consumes:
      - application/json
      description: 'Changes the role (<code>owner</code>, <code>editor</code>, or
        <code>viewer</code>) of a workspace member. Safeguard: the last owner cannot
        demote themselves.'
      parameters:
      - description: User ID whose role to change
        in: path
        name: userId
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateMemberRoleRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Cannot demote the last owner
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a member's role
      tags:
      - Workspace
  /api/v1/workspace/settings:
    put:
      consumes:
      - application/json
      description: 'Updates the workspace''s version retention policy and EXIF metadata
        settings. <ul> <li><strong>version_retention_count</strong>: Maximum number
        of asset versions to keep per asset. 0 = keep all.</li> <li><strong>exif_keep</strong>:
        Whether EXIF metadata is preserved on uploaded images.</li> <li><strong>exif_keep_gps</strong>:
        Whether GPS coordinates are preserved within EXIF data (requires exif_keep=true).</li>
        </ul>'
      parameters:
      - description: Settings to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateWorkspaceSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkspaceResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update workspace settings
      tags:
      - Workspace
  /api/v1/workspace/settings/aiproviders/{provider}:
    delete:
      description: Removes the workspace-scoped API key for the given provider. Falls
        back to environment key if one exists.
      parameters:
      - description: Provider ID
        in: path
        name: provider
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Provider not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Clear AI provider API key
      tags:
      - AIProviders
    get:
      description: Returns whether an API key is configured for the given provider
        and its source (workspace or environment).
      parameters:
      - description: Provider ID (e.g. openrouter)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AIProviderKeyStatusResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Provider not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get AI provider key status
      tags:
      - AIProviders
    put:
      consumes:
      - application/json
      description: Stores an API key for the given provider at workspace scope, overriding
        any environment-level key.
      parameters:
      - description: Provider ID
        in: path
        name: provider
        required: true
        type: string
      - description: API key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateAIProviderKeyRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Provider not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Set AI provider API key
      tags:
      - AIProviders
  /api/v1/workspace/settings/aiproviders/{provider}/test:
    post:
      description: Validates the configured API key for the given provider by making
        a live request. Returns 422 if the key is missing or rejected.
      parameters:
      - description: Provider ID
        in: path
        name: provider
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Provider not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Key invalid or unreachable
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Test AI provider API key
      tags:
      - AIProviders
  /api/v1/workspace/switch:
    post:
      consumes:
      - application/json
      description: Issues a fresh JWT scoped to the requested workspace and updates
        the <code>auth_token</code> cookie accordingly. All subsequent authenticated
        requests will operate in the new workspace context. The user must be a member
        of the target workspace.
      parameters:
      - description: Target workspace ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SwitchWorkspaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwitchWorkspaceResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Not a member of this workspace
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Switch active workspace
      tags:
      - Workspace
  /api/v1/workspaces:
    get:
      description: Returns every workspace the authenticated user is a member of,
        along with their role in each.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.WorkspaceWithRoleResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workspaces
      tags:
      - Workspace
  /auth/canva/callback:
    get:
      description: Receives the authorization code from Canva. Validates state and
        PKCE, exchanges the code, fetches the user profile from the Canva API (<code>/rest/v1/users/me</code>),
        upserts the user, issues a session cookie, and redirects to <code>/</code>.
        On any error redirects to <code>/login?error=oidc_exchange&error_step=...</code>.
      parameters:
      - description: Authorization code from Canva
        in: query
        name: code
        required: true
        type: string
      - description: State parameter (CSRF token)
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Redirect to / on success, or /login?error=... on failure
          schema:
            type: string
      summary: Canva OAuth2 callback
      tags:
      - Auth
  /auth/canva/link:
    delete:
      description: Removes the Canva login method from the current user's account.
        Fails with 422 if Canva is the user's only auth method (would lock them out).
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot unlink — only auth method remaining
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Could not unlink
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unlink Canva provider
      tags:
      - Auth
  /auth/canva/login:
    get:
      description: Redirects the browser to Canva's OAuth2 authorization endpoint
        requesting the <code>profile:read</code> scope. Sets short-lived <code>oidc_state</code>
        and <code>oidc_pkce</code> cookies (10 min TTL). Returns 503 if Canva OAuth
        is not configured.
      responses:
        "302":
          description: Redirect to Canva OAuth2
          schema:
            type: string
        "503":
          description: Canva login not configured
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Initiate Canva login
      tags:
      - Auth
  /auth/google/callback:
    get:
      description: Receives the authorization code from Google. Validates state and
        PKCE, exchanges the code, verifies the ID token, upserts the user (marked
        as Google-linked), issues a session cookie, and redirects to <code>/</code>.
        On any error redirects to <code>/login?error=...</code>.
      parameters:
      - description: Authorization code from Google
        in: query
        name: code
        required: true
        type: string
      - description: State parameter (CSRF token)
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Redirect to / on success, or /login?error=... on failure
          schema:
            type: string
      summary: Google OAuth2 callback
      tags:
      - Auth
  /auth/google/link:
    delete:
      description: Removes the Google login method from the current user's account.
        Fails with 422 if Google is the user's only auth method (would lock them out).
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot unlink — only auth method remaining
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Could not unlink
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unlink Google provider
      tags:
      - Auth
  /auth/google/login:
    get:
      description: Redirects the browser to Google's OAuth2 authorization endpoint
        with <code>prompt=select_account</code>. Sets short-lived <code>oidc_state</code>
        and <code>oidc_pkce</code> cookies (10 min TTL). Returns 503 if Google OAuth
        is not configured.
      responses:
        "302":
          description: Redirect to Google OAuth2
          schema:
            type: string
        "503":
          description: Google login not configured
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Initiate Google login
      tags:
      - Auth
  /auth/invite/accept:
    post:
      consumes:
      - application/json
      description: 'Redeems a one-time invite token: creates a new user account (name
        + password required) and adds them to the workspace at the role encoded in
        the invite. The invite token is marked as accepted and cannot be reused. Returns
        a JWT just like <code>POST /auth/register</code>.'
      parameters:
      - description: Invite token, name, and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.AcceptInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "404":
          description: Invalid or expired invite token
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      summary: Accept a workspace invite
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates the user with email and password. Returns a JWT token
        in the response body and sets an <code>auth_token</code> httpOnly cookie (7-day
        expiry). The workspace embedded in the response is the user's first workspace
        — use <code>POST /api/v1/workspace/switch</code> to change it.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      summary: Log in
      tags:
      - Auth
  /auth/logout:
    post:
      description: Clears the <code>auth_token</code> httpOnly cookie by setting it
        to an expired value. No server-side session state is maintained, so this is
        a client-side-only operation.
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Log out
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns the profile of the currently authenticated user including
        their linked OAuth providers (OIDC, Google, Canva).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.MeResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Could not load user
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
  /auth/oidc/callback:
    get:
      description: Receives the authorization code from the OIDC provider. Validates
        state (CSRF) and PKCE, exchanges the code for tokens, verifies the ID token,
        upserts the user, issues a session cookie, and redirects to <code>/</code>.
        On any error redirects to <code>/login?error=...</code>.
      parameters:
      - description: Authorization code from provider
        in: query
        name: code
        required: true
        type: string
      - description: State parameter (CSRF token)
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Redirect to / on success, or /login?error=... on failure
          schema:
            type: string
      summary: OIDC callback
      tags:
      - Auth
  /auth/oidc/link:
    delete:
      description: Removes the OIDC login method from the current user's account.
        Fails with 422 if OIDC is the user's only auth method (would lock them out).
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot unlink — only auth method remaining
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Could not unlink
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Unlink OIDC provider
      tags:
      - Auth
  /auth/oidc/login:
    get:
      description: Redirects the browser to the configured OIDC provider's authorization
        endpoint. Sets short-lived <code>oidc_state</code> and <code>oidc_pkce</code>
        cookies (10 min TTL) for CSRF and PKCE verification. Returns 503 if OIDC is
        not configured.
      responses:
        "302":
          description: Redirect to OIDC provider
          schema:
            type: string
        "503":
          description: OIDC not configured
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Initiate OIDC login
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Reissues a fresh JWT with a new 7-day expiry for the authenticated
        user and workspace. The new token is returned in the response body and also
        set as an updated <code>auth_token</code> cookie. Call this endpoint before
        the current token expires to maintain a session without re-login.
      produces:
      - application/json
      responses:
        "200":
          description: token
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh auth token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with name, email, and password. A default
        workspace is automatically created for the new user. The response includes
        a JWT auth token set as an <code>auth_token</code> httpOnly cookie and also
        returned in the response body.
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /config:
    get:
      description: Returns public feature flags and configuration values that the
        frontend needs before authentication. Currently exposes the <code>demo</code>
        boolean which, when true, puts the server into read-only demonstration mode.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ConfigResponse'
      summary: Get server config
      tags:
      - Config
  /e/{token}:
    get:
      description: 'Unauthenticated. Always serves whatever version is current at
        request time. Returns Cache-Control: public, no-cache so CDNs revalidate on
        every request, but sets ETag from the version''s content hash so a CDN can
        serve a 304 when the content hasn''t changed.'
      parameters:
      - description: 16-char base62 embed token
        in: path
        name: token
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
        "304":
          description: Not Modified (ETag matched)
        "404":
          description: Token not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Token revoked
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Stream the current-version file for a public embed token
      tags:
      - Public Embed
  /e/{token}/thumb:
    get:
      description: Unauthenticated. Same token resolution and ETag semantics as GET
        /e/:token. Returns 202 with a Retry-After header when the thumbnail has not
        finished generating yet — this is a normal, expected state for recently uploaded
        assets, not an error.
      parameters:
      - description: 16-char base62 embed token
        in: path
        name: token
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            type: file
        "202":
          description: Thumbnail not ready yet
          schema:
            additionalProperties: true
            type: object
        "304":
          description: Not Modified (ETag matched)
        "404":
          description: Token not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Token revoked
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Stream the current-version thumbnail for a public embed token
      tags:
      - Public Embed
  /healthz:
    get:
      consumes:
      - '*/*'
      description: get the status of server.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Show the status of server.
      tags:
      - Config
  /shared/{id}/access:
    get:
      description: Returns the share's label and whether it requires a password. Use
        this as the first call when a visitor lands on a share link — if <code>has_password</code>
        is true, show a password gate before calling <code>POST /shared/:id/access</code>.
        Returns 404 if the share does not exist or has been revoked, and 410 if it
        has expired.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareInfoResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Share has expired
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get share info (public)
      tags:
      - Public Shares
    post:
      consumes:
      - application/json
      description: 'Validates the share (checks password if one is set) and issues
        a 24-hour share session token. Include this token as <code>Authorization:
        Bearer &lt;token&gt;</code> in all subsequent requests to <code>/shared/:id/*</code>
        endpoints. Also increments the share''s view count.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Visitor name (required) and password (if required)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ShareAccessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareAccessResponse'
        "400":
          description: visitor_name missing or too long
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Password required or incorrect
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Share has expired
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Authenticate share access (public)
      tags:
      - Public Shares
  /shared/{id}/assets:
    get:
      description: 'Returns all assets accessible through the share, along with share
        metadata (<code>allow_comments</code>, <code>allow_download</code>, etc.).
        The asset set depends on the share''s target type: a single asset for <code>asset</code>
        shares, all project assets for <code>project</code> shares. Requires a valid
        share session token.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareAssetsResponse'
        "401":
          description: Not authenticated (share token required)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Share has expired or been revoked
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List share assets (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}:
    get:
      description: Returns a single asset accessible via the share. Returns 404 if
        the asset is not part of the share's target. Requires a valid share session
        token.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found in this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get share asset (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}/comments:
    get:
      description: Returns all comments posted on a specific asset within the share.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.CommentResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found in this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset comments (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}/file:
    get:
      description: 'Streams the original file for an asset accessible via the share.
        Returns 403 if the share was created with <code>allow_download: false</code>.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Download not allowed for this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download shared asset file (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}/thumb:
    get:
      description: Streams the JPEG thumbnail for an asset accessible via the share.
        Thumbnails are always accessible regardless of the <code>allow_download</code>
        setting, as they are needed for review purposes. Returns 404 if the thumbnail
        has not yet been generated.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found or thumbnail not ready
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get shared asset thumbnail (public)
      tags:
      - Public Shares
  /shared/{id}/comments:
    get:
      description: Returns all comments on the share, grouped by <code>asset_id</code>.
        Useful for rendering a review dashboard showing all feedback at once.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Array of {asset_id, comments[]} groups
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List share comments (public)
      tags:
      - Public Shares
    post:
      consumes:
      - application/json
      description: 'Posts a comment on an asset within the share. The share must have
        <code>allow_comments: true</code>. Commenters identify themselves by name;
        an optional email can be provided. Returns 403 if comments are disabled for
        this share.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Comment content and author info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.CommentResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Comments not allowed for this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found in this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Post a comment (public)
      tags:
      - Public Shares
  /shared/{id}/export:
    get:
      description: 'Streams a ZIP archive of all assets accessible via the share.
        Works for <code>asset</code>, <code>project</code>, and <code>collection</code>
        target types. Requires the share to have <code>allow_download: true</code>
        and a valid share session token. The ZIP is scoped strictly to the share''s
        target — it cannot expose assets outside it.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: ZIP archive
          schema:
            type: file
        "401":
          description: Not authenticated (share token required)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Download not allowed for this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found or expired
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download shared assets as ZIP (public)
      tags:
      - Public Shares
