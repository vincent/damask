            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an asset
      tags:
      - Assets
    get:
      description: Returns the full asset record including tags, version count, and
        a flag indicating whether variants are currently being rebuilt.
      parameters:
