    get:
      description: Returns all workspace invites that have not yet been accepted and
        have not expired. The <code>invite_token</code> field is omitted from list
        responses for security — it is only returned once, when the invite is created.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.InviteResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List pending invites
      tags:
      - Workspace
    post:
      consumes:
      - application/json
      description: Generates a time-limited invite token (7-day expiry) for the given
        email address. The <code>invite_token</code> in the response should be sent
        to the recipient; they redeem it via <code>POST /auth/invite/accept</code>.
        Only workspace owners may create invites.
      parameters:
      - description: Invite details (email and role)
        in: body
        name: body
        required: true
