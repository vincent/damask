  /api/v1/assets/{id}/variants:
    get:
      description: Returns all generated variants for the asset's current version,
        plus a <code>rebuilding</code> flag that is true when a variant rebuild job
        is in progress (e.g. after a new version upload). Each variant includes a
        <code>download_url</code> for direct file access.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ListVariantsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset variants
      tags:
      - Variants
    post:
      consumes:
      - application/json
      description: 'Enqueues a background job to generate a transformed variant of
        the asset''s current version. Supported types and their required params: <ul>
        <li><strong>image_resize</strong> — <code>{"width": N, "height": N, "fit":
        "contain|cover|fill"}</code></li> <li><strong>image_convert</strong> — <code>{"format":
        "jpeg|png|webp|avif"}</code> (WebP output is lossless; quality only affects
        JPEG)</li> <li><strong>image_crop</strong> — <code>{"x": N, "y": N, "width":
        N, "height": N}</code></li> <li><strong>image_watermark</strong> — <code>{"opacity":
        0.5}</code></li> <li><strong>image_smart_crop</strong> — <code>{"width": N,
        "height": N}</code> (AI-assisted)</li> <li><strong>image_bg_remove</strong>
        — <code>{"model": "bria/remove-background"}</code></li> <li><strong>image_with_prompt</strong>
        — <code>{"prompt": "...", "model": "black-forest-labs/FLUX.1-fill-dev"}</code></li>
        <li><strong>video_transcode</strong> — <code>{"format": "mp4", "codec": "h264"}</code></li>
        <li><strong>video_watermark</strong> — <code>{"opacity": 0.5, "format": "mp4"}</code></li>
        <li><strong>video_capture_image</strong> — <code>{"time_sec": N}</code></li>
        <li><strong>custom_ffmpeg</strong> — <code>{"command": "ffmpeg -i {input}
        ... {output}"}</code> (any MIME type; output format auto-detected via ffprobe)</li>
        </ul> Returns a job ID immediately; poll <code>GET /api/v1/assets/:id/variants</code>
        to check completion. Returns 409 if a variant rebuild is already in progress.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Variant type and transform params
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateVariantRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.CreateVariantResponse'
        "400":
          description: Invalid variant type or wrong asset type
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Variant rebuild already in progress
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Asset has no current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a variant
      tags:
      - Variants
  /api/v1/assets/{id}/variants/{vid}:
    delete:
      description: Permanently removes the variant record and its stored file. Only
        variants attached to the <em>current</em> version can be deleted manually
        — variants on older versions are removed automatically by the retention purge
        job.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Variant ID
        in: path
