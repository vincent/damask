  /api/v1/assets/{id}/variants/upload:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a multipart file upload and stores it as a variant of type
        <code>manual</code> on the asset's current version. Unlike transform-generated
        variants, manual variants are <em>not</em> automatically rebuilt when a new
        version is uploaded — they persist across version changes. Use this to attach
        pre-processed or third-party exports (e.g. color-corrected TIFF, print-ready
        PDF).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: File to attach as a manual variant
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.VariantResponse'
        "400":
          description: file field is required
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Asset has no current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a manual variant
      tags:
      - Variants
  /api/v1/assets/{id}/variants/watermark:
