info:
  contact: {}
paths:
  /api/v1/activity:
    get:
      description: 'Returns a unified, cursor-paginated activity feed combining asset
        and project events across the entire workspace, sorted newest-first. Useful
        for building an activity timeline or a notification feed.<br><br> Each event
        in the response includes an <code>entity_type</code> (<code>asset</code> or
        <code>project</code>) and <code>entity_id</code> so the caller can link back
        to the originating resource.<br><br> Supported query parameters: <ul> <li><strong>limit</strong>
        — Number of events (1–100, default 20).</li> <li><strong>cursor</strong> —
        Opaque cursor from <code>next_cursor</code> in the previous response.</li>
        <li><strong>user_id</strong> — Filter to events by a specific user.</li> <li><strong>types</strong>
        — Comma-separated event type filter.</li> </ul>'
      parameters:
      - description: Page size (1–100, default 20)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Filter by actor user ID
        in: query
        name: user_id
        type: string
      - description: Comma-separated event type filter
        in: query
        name: types
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.EventListResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workspace activity
      tags:
      - Audit
  /api/v1/activity/export:
    get:
      description: 'Exports up to 10,000 workspace audit events (both asset and project)
        as a <code>text/csv</code> download. The response sets <code>Content-Disposition:
        attachment; filename="activity-export.csv"</code>.<br><br> CSV columns: <code>event_id,
        event_type, entity_type, entity_id, actor_type, actor_name, payload_summary,
        created_at</code>.<br><br> Supported query parameters: <ul> <li><strong>since</strong>
        — Exclude events before this date (inclusive, <code>YYYY-MM-DD</code>).</li>
        <li><strong>until</strong> — Exclude events after this date (inclusive, <code>YYYY-MM-DD</code>).</li>
        <li><strong>format</strong> — Currently only <code>csv</code> is supported.</li>
        </ul>'
      parameters:
      - description: Start date filter (YYYY-MM-DD)
        in: query
        name: since
        type: string
      - description: End date filter (YYYY-MM-DD)
        in: query
        name: until
        type: string
      - description: Export format (only csv supported)
        in: query
        name: format
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Invalid date format or unsupported format
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export workspace activity
      tags:
      - Audit
  /api/v1/assets:
    get:
      description: 'Returns a paginated list of assets. The behaviour is controlled
        by query parameters: <ul> <li><strong>q</strong> — Full-text search across
        filenames and custom field text values.</li> <li><strong>tags</strong> — Comma-separated
        tag names. Returns only assets that have ALL listed tags (AND logic).</li>
        <li><strong>folder_id</strong> — Filter by folder. Use <code>root</code> to
        list assets with no folder in a project.</li> <li><strong>project_id</strong>
        — Filter by project (required when folder_id=root).</li> <li><strong>mime</strong>
        — Filter by MIME type prefix (e.g. <code>image/</code> or <code>video/mp4</code>).</li>
        <li><strong>sort</strong> — Sort order: <code>created_at_desc</code> (default),
        <code>created_at_asc</code>, <code>size_asc</code>, <code>size_desc</code>,
        <code>id_asc</code>, <code>id_desc</code>, <code>taken_at</code>, <code>taken_at_desc</code>.</li>
        <li><strong>limit</strong> — Page size, 1–100 (default 50).</li> <li><strong>cursor</strong>
        — Opaque cursor from the previous page''s <code>next_cursor</code> field.</li>
        <li><strong>field[key]</strong> — Filter by custom field value, e.g. <code>field[status]=published</code>.</li>
        </ul>'
      parameters:
      - description: Full-text search query
        in: query
        name: q
        type: string
      - description: Comma-separated tag names (AND filter)
        in: query
        name: tags
        type: string
      - description: Folder ID (use 'root' for unfoldered assets in a project)
        in: query
        name: folder_id
        type: string
      - description: Project ID
        in: query
        name: project_id
        type: string
      - description: MIME type prefix filter
        in: query
        name: mime
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Page size (1-100, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetListResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List assets
      tags:
      - Assets
    post:
      consumes:
      - multipart/form-data
      description: 'Uploads a file as a new asset in the workspace. The request must
        be a multipart form with a <code>file</code> field. Optional form fields:
        <ul> <li><strong>project_id</strong> — assign the asset to a project on creation.</li>
        <li><strong>folder_id</strong> — assign the asset to a folder on creation.</li>
        </ul> On success a thumbnail generation job is enqueued automatically. An
        <code>asset_created</code> audit event is written and custom fields are inherited
        from the project if applicable.'
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Project ID
        in: formData
        name: project_id
        type: string
      - description: Folder ID
        in: formData
        name: folder_id
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "400":
          description: file field is required
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload an asset
      tags:
      - Assets
  /api/v1/assets/{id}:
    delete:
      description: Permanently deletes the asset record, its storage file, and its
        thumbnail. All associated variants, versions, tags, and field values are also
        removed via cascade. This action cannot be undone.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an asset
      tags:
      - Assets
    get:
      description: Returns the full asset record including tags, version count, and
        a flag indicating whether variants are currently being rebuilt.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an asset
      tags:
      - Assets
    patch:
      consumes:
      - application/json
      description: Updates the asset's <code>folder_id</code> and/or <code>project_id</code>.
        Set either field to null to remove the assignment. The target folder and project
        must belong to the same workspace.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: New folder and/or project assignment
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateAssetFolderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Move asset to a folder
      tags:
      - Assets
  /api/v1/assets/{id}/comments:
    get:
      description: Returns all public share comments that have been posted on this
        asset across all shares.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.CommentResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get asset comments
      tags:
      - Assets
  /api/v1/assets/{id}/events:
    get:
      description: 'Returns paginated audit events for the given asset. Events record
        every significant lifecycle action — uploads, renames, tagging, sharing, version
        changes, and more.<br><br> Supported query parameters: <ul> <li><strong>limit</strong>
        — Number of events to return (1–200, default 50).</li> <li><strong>cursor</strong>
        — Opaque cursor from the previous page''s <code>next_cursor</code> field.</li>
        <li><strong>types</strong> — Comma-separated list of event types to filter
        to (e.g. <code>asset_shared,asset_renamed</code>).</li> </ul>'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Page size (1–200, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Comma-separated event type filter
        in: query
        name: types
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.EventListResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset events
      tags:
      - Audit
  /api/v1/assets/{id}/fields:
    get:
      description: 'Returns all custom field values set on the asset, including fields
        for which no value has been set yet (those have <code>value: null</code>).
        Each entry includes the field definition metadata (<code>key</code>, <code>name</code>,
        <code>field_type</code>) alongside the typed value. The <code>definition_deleted</code>
        flag indicates the field definition was soft-deleted — the value is still
        stored but the field is no longer active.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetAssetFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get asset field values
      tags:
      - Custom Fields
    patch:
      consumes:
      - application/json
      description: 'Sets or clears one or more custom field values on the asset. Each
        entry in the <code>values</code> array targets a field by <code>field_id</code>.
        To clear a value, pass <code>null</code> as the value. All values are validated
        before any writes.<br><br> Value types must match the field definition''s
        <code>field_type</code>: <ul> <li><strong>text / url</strong> — string</li>
        <li><strong>number</strong> — number</li> <li><strong>date</strong> — string
        in <code>YYYY-MM-DD</code> format</li> <li><strong>boolean</strong> — boolean</li>
        <li><strong>select</strong> — string matching one of the field''s defined
        options</li> </ul> Returns the full updated field values for the asset.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Field values to set
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PatchAssetFieldsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetAssetFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Value validation failed
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update asset field values
      tags:
      - Custom Fields
  /api/v1/assets/{id}/file:
    get:
      description: Streams the raw file bytes of the asset's current version. The
        response Content-Type matches the asset's MIME type and Content-Disposition
        is set to <code>inline</code> with the original filename. An <code>asset_downloaded</code>
        audit event is recorded (browser image prefetch requests are excluded).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download asset file
      tags:
      - Assets
  /api/v1/assets/{id}/preview:
    get:
      description: 'Applies a resize/format transform to the asset''s current version
        in memory and returns the result directly (never stored). Responses are cached
        in an LRU cache (100 entries, 5-minute TTL) so repeated identical calls are
        cheap. <br>Query parameters: <ul> <li><strong>w</strong> — Target width in
        pixels</li> <li><strong>h</strong> — Target height in pixels</li> <li><strong>fit</strong>
        — Fit mode: <code>contain</code> (default), <code>cover</code>, <code>fill</code></li>
        <li><strong>format</strong> — Output format: <code>jpeg</code> (default),
        <code>png</code>, <code>webp</code></li> <li><strong>q</strong> — JPEG quality
        1–100 (default: encoder default)</li> </ul> Only supported for image assets.
        Returns 400 for video, audio, or PDF assets.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Target width
        in: query
        name: w
        type: integer
      - description: Target height
        in: query
        name: h
        type: integer
      - description: Fit mode (contain|cover|fill)
        in: query
        name: fit
        type: string
      - description: Output format (jpeg|png|webp)
        in: query
        name: format
        type: string
      - description: JPEG quality (1-100)
        in: query
        name: q
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Preview only supported for images
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Preview image transform
      tags:
      - Variants
  /api/v1/assets/{id}/rename:
    put:
      consumes:
      - application/json
      description: Updates the asset's <code>original_filename</code>. The new name
        must include the correct file extension matching the asset's MIME type.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: New filename
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RenameAssetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Rename an asset
      tags:
      - Assets
  /api/v1/assets/{id}/tags:
    get:
      description: Returns a flat array of tag name strings applied to the specified
        asset.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get tags for an asset
      tags:
      - Assets
    post:
      consumes:
      - application/json
      description: Adds a tag to the specified asset. If the tag does not exist in
        the workspace it is created automatically. Also updates the tag's <code>last_used_at</code>
        timestamp.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Tag name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.AddTagRequest'
      produces:
      - application/json
      responses:
        "201":
          description: name of the applied tag
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Add tag to an asset
      tags:
      - Assets
  /api/v1/assets/{id}/tags/{name}:
    delete:
      description: Removes the association between the tag and the asset. The tag
        itself is not deleted from the workspace. Tag name matching is case-insensitive.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Tag name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove tag from an asset
      tags:
      - Assets
  /api/v1/assets/{id}/thumb:
    get:
      description: Streams the JPEG thumbnail for the asset. Thumbnails are generated
        asynchronously after upload; returns 404 if generation has not yet completed.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found or thumbnail not ready
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get asset thumbnail
      tags:
      - Assets
  /api/v1/assets/{id}/variants:
    get:
      description: Returns all generated variants for the asset's current version,
        plus a <code>rebuilding</code> flag that is true when a variant rebuild job
        is in progress (e.g. after a new version upload). Each variant includes a
        <code>download_url</code> for direct file access.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ListVariantsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset variants
      tags:
      - Variants
    post:
      consumes:
      - application/json
      description: 'Enqueues a background job to generate a transformed variant of
        the asset''s current version. Supported types and their required params: <ul>
        <li><strong>image_resize</strong> — <code>{"width": N, "height": N, "fit":
        "contain|cover|fill"}</code></li> <li><strong>image_convert</strong> — <code>{"format":
        "jpeg|png|webp|avif"}</code></li> <li><strong>image_crop</strong> — <code>{"x":
        N, "y": N, "width": N, "height": N}</code></li> <li><strong>image_watermark</strong>
        — <code>{"text": "...", "position": "..."}</code></li> <li><strong>image_smart_crop</strong>
        — <code>{"width": N, "height": N}</code> (AI-assisted)</li> <li><strong>image_bg_remove</strong>
        — requires <code>REMOVEBG_API_KEY</code> env var</li> <li><strong>video_transcode</strong>
        — <code>{"format": "mp4", "codec": "h264"}</code></li> <li><strong>video_capture_image</strong>
        — <code>{"time_sec": N}</code></li> </ul> Returns a job ID immediately; poll
        <code>GET /api/v1/assets/:id/variants</code> to check completion. Returns
        409 if a variant rebuild is already in progress.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Variant type and transform params
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateVariantRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/api.CreateVariantResponse'
        "400":
          description: Invalid variant type or wrong asset type
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Variant rebuild already in progress
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Asset has no current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a variant
      tags:
      - Variants
  /api/v1/assets/{id}/variants/{vid}:
    delete:
      description: Permanently removes the variant record and its stored file. Only
        variants attached to the <em>current</em> version can be deleted manually
        — variants on older versions are removed automatically by the retention purge
        job.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Variant ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or variant not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Variant belongs to a previous version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a variant
      tags:
      - Variants
  /api/v1/assets/{id}/variants/{vid}/file:
    get:
      description: Streams the variant's stored file. Content-Type is derived from
        the file extension. An <code>asset_variant_downloaded</code> audit event is
        recorded (browser image prefetch excluded).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Variant ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset, variant, or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download variant file
      tags:
      - Variants
  /api/v1/assets/{id}/variants/upload:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a multipart file upload and stores it as a variant of type
        <code>manual</code> on the asset's current version. Unlike transform-generated
        variants, manual variants are <em>not</em> automatically rebuilt when a new
        version is uploaded — they persist across version changes. Use this to attach
        pre-processed or third-party exports (e.g. color-corrected TIFF, print-ready
        PDF).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: File to attach as a manual variant
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.VariantResponse'
        "400":
          description: file field is required
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Asset has no current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a manual variant
      tags:
      - Variants
  /api/v1/assets/{id}/versions:
    get:
      description: 'Returns all versions of an asset in reverse chronological order.
        Each version includes its <code>version_num</code>, MIME type, dimensions,
        file size, optional comment, and the number of variants derived from it (<code>variant_count</code>).
        The current version has <code>is_current: true</code>.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.VersionResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset versions
      tags:
      - Versions
    post:
      consumes:
      - multipart/form-data
      description: 'Uploads a new file as the next version of an existing asset. The
        new version is immediately promoted to current. The previous current version
        is retained in history.<br><br> After upload, the server: <ul> <li>Enqueues
        a thumbnail generation job for the new version.</li> <li>Enqueues a variant
        rebuild job that recreates all variants from the previous current version.</li>
        <li>Clears the asset''s cached thumbnail (pending the new job).</li> </ul>
        If the uploaded file is byte-for-byte identical to the current version (same
        content hash), the request is rejected with 409 to prevent no-op versions.<br><br>
        The response body contains both the new <code>version</code> object and the
        updated <code>asset</code> object.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: New version file
        in: formData
        name: file
        required: true
        type: file
      - description: Optional change note (max 500 characters)
        in: formData
        name: comment
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.VersionWithAssetResponse'
        "400":
          description: Missing file field
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: File is identical to the current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Comment too long
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a new version
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}:
    delete:
      description: Soft-deletes an asset version. The current version cannot be deleted
        — restore a different version first, then delete the old one. A version also
        cannot be deleted while it is in use as a project cover or workspace icon
        (returns 409).<br><br> Soft deletion marks the row as deleted; the storage
        file is not immediately removed (physical cleanup is handled by a background
        retention job).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or version not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Version is in use as a cover/icon
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot delete the current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a version
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}/file:
    get:
      description: Streams the raw file for the specified version. The response MIME
        type and <code>Content-Disposition</code> are set from the stored version
        metadata.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset, version, or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get version file
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}/restore:
    post:
      description: Promotes a non-current version to be the current version of the
        asset. The asset's thumbnail is also updated to match the restored version.
        An audit event records the version numbers rolled back from and to.<br><br>
        Returns 409 if the requested version is already current. Returns 422 if the
        version has been soft-deleted. The response contains the updated <code>version</code>
        and <code>asset</code>.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID to restore
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.VersionWithAssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or version not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Version is already current
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot restore a deleted version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Restore a version
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}/thumb:
    get:
      description: Returns the JPEG thumbnail for the given version. Returns 404 if
        the thumbnail has not yet been generated (the job runs asynchronously after
        upload — poll until the <code>thumbnail_url</code> field in the version response
        is non-null).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset, version, or thumbnail not ready
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get version thumbnail
      tags:
      - Versions
  /api/v1/assets/bulk:
    delete:
      consumes:
      - application/json
      description: Permanently deletes all listed assets, their storage files, thumbnails,
        variants, and associated data. Assets not found in the workspace are silently
        skipped. This action cannot be undone.
      parameters:
      - description: Asset IDs to delete
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.BulkDeleteRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk delete assets
      tags:
      - Assets
  /api/v1/assets/bulk/fields:
    patch:
      consumes:
      - application/json
      description: Applies the same set of field value changes to multiple assets
        in a single transaction. Assets not belonging to the workspace are silently
        skipped. Returns the count of assets successfully updated.<br><br> Supports
        the same value format and null-for-clear semantics as the single-asset PATCH
        endpoint.
      parameters:
      - description: Asset IDs and field values
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.BulkPatchAssetFieldsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.BulkPatchAssetFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Value validation failed
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk update asset field values
      tags:
      - Custom Fields
  /api/v1/assets/bulk/project:
    post:
      consumes:
      - application/json
      description: Assigns all listed assets to the given project. Set <code>project_id</code>
        to null to remove assets from their current project. Assets not found in the
        workspace are silently skipped.
      parameters:
      - description: Asset IDs and optional project ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.BulkProjectRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk assign assets to a project
      tags:
      - Assets
  /api/v1/assets/bulk/tag:
    post:
      consumes:
      - application/json
      description: Adds a single tag to all specified assets. If the tag does not
        exist in the workspace it is created automatically. Assets not found in the
        workspace are silently skipped.
      parameters:
      - description: Asset IDs and tag name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.BulkTagRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk tag assets
      tags:
      - Assets
  /api/v1/field-definitions:
    get:
      description: 'Returns all custom field definitions for the workspace filtered
        by scope. Field definitions describe the schema for structured metadata that
        can be attached to assets (<code>scope=asset</code>) or projects (<code>scope=project</code>).<br><br>
        Supported field types: <code>text</code>, <code>number</code>, <code>date</code>,
        <code>boolean</code>, <code>select</code>, <code>url</code>.'
      parameters:
      - description: 'Scope filter: asset (default) or project'
        in: query
        name: scope
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.FieldDefinitionResponse'
            type: array
        "400":
          description: Invalid scope value
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List field definitions
      tags:
      - Custom Fields
    post:
      consumes:
      - application/json
      description: Creates a new custom field definition for assets or projects. The
        <code>key</code> must be lowercase alphanumeric with underscores and is immutable
        after creation. A maximum of 50 definitions per scope is enforced.<br><br>
        For <code>select</code> fields, supply an <code>options</code> array of string
        choices. The <code>inherit_from_project</code> flag (asset-scope only) causes
        the field to automatically pre-populate from the assigned project's value.
      parameters:
      - description: Field definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateFieldDefinitionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.FieldDefinitionResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Key already exists in this scope
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed or 50-field limit reached
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a field definition
      tags:
      - Custom Fields
  /api/v1/field-definitions/{id}:
    delete:
      description: Soft-deletes the field definition. The definition is hidden from
        the list endpoint but existing field values on assets and projects are preserved.
        This action is permanent from the API perspective (no undelete endpoint).
      parameters:
      - description: Field definition ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Field definition not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a field definition
      tags:
      - Custom Fields
    get:
      description: Returns a single custom field definition.
      parameters:
      - description: Field definition ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.FieldDefinitionResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Field definition not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a field definition
      tags:
      - Custom Fields
    put:
      consumes:
      - application/json
      description: Updates a custom field definition. The <code>key</code> and <code>field_type</code>
        are immutable after creation — supplying a different value returns 422. All
        other fields are optional; omitted fields retain their current values.<br><br>
        For <code>select</code> fields, <code>options</code> must be a non-empty JSON
        array of strings.
      parameters:
      - description: Field definition ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateFieldDefinitionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.FieldDefinitionResponse'
        "400":
          description: Invalid options format or empty name
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Field definition not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Attempt to change immutable key or field_type
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a field definition
      tags:
      - Custom Fields
  /api/v1/field-definitions/{id}/stats:
    get:
      description: Returns the number of assets and projects that have a value set
        for this field definition. Useful for understanding the impact of deleting
        a field.
      parameters:
      - description: Field definition ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.FieldDefinitionStatsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Field definition not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get field definition stats
      tags:
      - Custom Fields
  /api/v1/field-definitions/reorder:
    put:
      consumes:
      - application/json
      description: 'Updates the <code>position</code> of multiple field definitions
        in a single request. The request body is a JSON array of <code>{"id": "...",
        "position": N}</code> objects. Items not belonging to this workspace are silently
        skipped (best-effort update).'
      parameters:
      - description: Reorder items
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ReorderFieldDefinitionsRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Reorder field definitions
      tags:
      - Custom Fields
  /api/v1/folders/{id}:
    delete:
      description: Permanently deletes the folder and any child folders. Assets inside
        the deleted folder(s) are <em>not</em> deleted — their <code>folder_id</code>
        is set to null so they remain in the project.
      parameters:
      - description: Folder ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Folder not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a folder
      tags:
      - Folders
    put:
      consumes:
      - application/json
      description: Updates the folder's name and/or position. All fields are optional.
        Renaming automatically regenerates the folder's URL slug.
      parameters:
      - description: Folder ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateFolderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.FolderResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Folder not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: A folder with that name already exists here
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a folder
      tags:
      - Folders
  /api/v1/ingress/log:
    get:
      description: Returns the most recent 50 ingress log entries across all sources
        in the workspace. Filter by status using the <code>status</code> query parameter
        to focus on entries that need attention (e.g. <code>error</code> or <code>skipped</code>).
      parameters:
      - description: Filter by status (pending, fetching, done, error, skipped)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.ingressLogResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workspace ingress log
      tags:
      - Ingress
  /api/v1/ingress/log/{entry_id}:
    delete:
      description: Permanently removes a log entry. Because ingress deduplication
        is based on <code>(source_id, remote_id)</code>, deleting an entry allows
        the same remote file to be re-ingested on the next poll. Use this to force
        a re-import of a previously processed file.
      parameters:
      - description: Log entry ID
        in: path
        name: entry_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Entry belongs to a different workspace
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Log entry not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a log entry
      tags:
      - Ingress
  /api/v1/ingress/log/{entry_id}/retry:
    post:
      description: Resets the log entry status to <code>pending</code> and enqueues
        a new <code>ingest_fetch</code> job to re-attempt asset import. Only entries
        with status <code>error</code> or <code>skipped</code> can be retried; attempting
        to retry a <code>done</code> or <code>pending</code> entry returns 400.<br><br>
        Returns the queued job ID. The retry runs asynchronously — poll the log entry
        to track completion.
      parameters:
      - description: Log entry ID
        in: path
        name: entry_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            properties:
              job_id:
                type: string
            type: object
        "400":
          description: Entry is not in error or skipped state
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Entry belongs to a different workspace
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Log entry not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Retry a log entry
      tags:
      - Ingress
  /api/v1/ingress/sources:
    get:
      description: Returns all ingress sources in the workspace. Sensitive config
        fields are redacted with <code>"***"</code> in every response.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.ingressSourceResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List ingress sources
      tags:
      - Ingress
    post:
      consumes:
      - application/json
      description: 'Creates a new ingress source for automated asset import. The <code>config</code>
        object is source-type-specific (see type documentation). Sensitive fields
        (passwords, keys, tokens) are encrypted at rest with AES-256-GCM and redacted
        (<code>"***"</code>) in all API responses.<br><br> Supported source types:
        <ul> <li><strong>imap</strong> — Poll an IMAP mailbox for attachments.</li>
        <li><strong>sftp</strong> — Poll a remote SFTP directory.</li> <li><strong>webdav</strong>
        — Poll a WebDAV endpoint.</li> <li><strong>s3</strong> — Poll an S3-compatible
        bucket.</li> <li><strong>email_api</strong> — Receive assets via SMTP push
        (uses <code>public_token</code>).</li> </ul> Optional <code>rules</code> array
        in the body bootstraps ingress rules for the source in a single request. Rules
        can also be managed later via the <code>/rules</code> sub-resource.'
      parameters:
      - description: Source configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateIngressSourceReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.ingressSourceResponse'
        "400":
          description: Invalid config JSON
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create an ingress source
      tags:
      - Ingress
  /api/v1/ingress/sources/{id}:
    delete:
      description: Permanently removes the source and all its associated rules. Log
        entries are retained for auditing. This action is irreversible.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an ingress source
      tags:
      - Ingress
    get:
      description: Returns the source record including its current enabled state and
        decrypted (but redacted) config. Sensitive config values are always replaced
        with <code>"***"</code>.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ingressSourceResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Source not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get an ingress source
      tags:
      - Ingress
    put:
      consumes:
      - application/json
      description: Updates the source label, config, destination folder/project, enabled
        state, and poll interval. Omitted fields keep their current values.<br><br>
        To update the config, supply a full replacement object — partial config merging
        is not supported. Sensitive fields provided in the new config are encrypted
        and stored; omitting them removes them. To clear <code>dest_folder_id</code>
        or <code>dest_project_id</code> pass an explicit <code>null</code> value.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateIngressSourceReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ingressSourceResponse'
        "400":
          description: Invalid config JSON
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Source not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update an ingress source
      tags:
      - Ingress
  /api/v1/ingress/sources/{id}/log:
    get:
      description: Returns the most recent 50 ingress log entries for the given source.
        Each entry represents one remote item that the source discovered, with its
        current ingestion status (<code>pending</code>, <code>fetching</code>, <code>done</code>,
        <code>error</code>, <code>skipped</code>).<br><br> The <code>(source_id, remote_id)</code>
        pair is unique — re-encountering the same remote file on a subsequent poll
        is a no-op unless the log entry is deleted or retried.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.ingressLogResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Source not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List source log entries
      tags:
      - Ingress
  /api/v1/ingress/sources/{id}/poll:
    post:
      description: Immediately enqueues an <code>ingest_poll</code> job for the source,
        regardless of its scheduled poll interval. Use this to force a check for new
        assets without waiting for the next scheduled run. Returns the queued job
        ID for tracking.<br><br> The job runs asynchronously; 202 Accepted means the
        job was enqueued, not that the poll completed. Monitor the ingress log to
        see results.
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            properties:
              job_id:
                type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Source not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger a poll
      tags:
      - Ingress
  /api/v1/ingress/sources/{id}/test:
    post:
      description: 'Validates that the source can successfully connect to the remote
        system using its current configuration. The check runs with a 10-second timeout.
        Returns <code>{"ok": true}</code> on success, or a descriptive error message
        on failure.<br><br> Use this after creating or updating a source to confirm
        credentials and network access are correct before relying on scheduled polling.'
      parameters:
      - description: Source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              ok:
                type: boolean
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Source not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Connection test failed — body contains the error message
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Test an ingress source
      tags:
      - Ingress
  /api/v1/projects:
    get:
      description: Returns all projects in the workspace, each with an <code>asset_count</code>
        field reflecting the number of assets currently assigned to it.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.ProjectResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - Projects
    post:
      consumes:
      - application/json
      description: Creates a new project container. Projects group assets and folders
        together. An optional color (hex) and description can be provided at creation
        time.
      parameters:
      - description: Project details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.ProjectResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a project
      tags:
      - Projects
  /api/v1/projects/{id}:
    delete:
      description: Permanently deletes the project. Assets that belonged to the project
        are <em>not</em> deleted — their <code>project_id</code> is set to null so
        they remain accessible in the unfiltered asset library.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a project
      tags:
      - Projects
    get:
      description: Returns the project with the given ID. Returns 404 if the project
        does not exist or belongs to a different workspace.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ProjectResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a project
      tags:
      - Projects
    put:
      consumes:
      - application/json
      description: Updates the project's name, description, color, or cover asset.
        All fields are optional — only the fields present in the request body are
        updated; omitted fields retain their current values.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ProjectResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a project
      tags:
      - Projects
  /api/v1/projects/{id}/events:
    get:
      description: Returns paginated audit events for the given project. Supports
        the same <code>limit</code>, <code>cursor</code>, and <code>types</code> query
        parameters as the asset events endpoint.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Page size (1–200, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Comma-separated event type filter
        in: query
        name: types
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.EventListResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List project events
      tags:
      - Audit
  /api/v1/projects/{id}/fields:
    get:
      description: Returns all custom field values set on the project. Only fields
        with <code>scope=project</code> are included. The response structure mirrors
        the asset fields endpoint.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetProjectFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get project field values
      tags:
      - Custom Fields
    patch:
      consumes:
      - application/json
      description: Sets or clears one or more custom field values on the project.
        Only fields with <code>scope=project</code> are accepted — submitting an asset-scoped
        field returns 422.<br><br> Pass <code>null</code> as the value to clear a
        field. Returns the full updated field values for the project.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Field values to set
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PatchProjectFieldsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetProjectFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project or field not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Value validation failed or wrong scope
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update project field values
      tags:
      - Custom Fields
  /api/v1/projects/{id}/folders:
    get:
      description: Returns a recursive tree of all folders in the project (up to 2
        levels deep). Each folder includes its children in a <code>children</code>
        array and an <code>asset_count</code> showing how many assets are directly
        inside it (not counting descendants).
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.FolderResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get folder tree
      tags:
      - Folders
    post:
      consumes:
      - application/json
      description: Creates a new folder in the given project. Folders are at most
        2 levels deep — a root folder can have child folders, but child folders cannot
        have their own children.<br> Use <code>parent_id</code> to create a sub-folder
        inside an existing root folder. An optional <code>position</code> integer
        controls ordering in the UI.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Folder details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateFolderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.FolderResponse'
        "400":
          description: Parent folder belongs to a different project
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Project or parent folder not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: A folder with that name already exists here
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Max folder depth exceeded
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a folder
      tags:
      - Folders
  /api/v1/shares:
    get:
      description: Returns all shares created in the workspace, including revoked
        and expired ones. Use the <code>revoked_at</code> and <code>is_expired</code>
        fields to filter active shares client-side.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.ShareResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List shares
      tags:
      - Shares
    post:
      consumes:
      - application/json
      description: 'Creates a public share link for the given target (asset or project).
        Options: <ul> <li><strong>password</strong> — Protect the share with a password.</li>
        <li><strong>expires_in_days</strong> — Automatically expire the share after
        N days.</li> <li><strong>allow_download</strong> — Whether viewers can download
        original files (default true).</li> <li><strong>allow_comments</strong> —
        Whether viewers can post comments (default false).</li> </ul> The response
        includes a <code>public_url</code> that can be shared directly with external
        reviewers.'
      parameters:
      - description: Share settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateShareRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.ShareResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Target asset or project not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a share
      tags:
      - Shares
  /api/v1/shares/{id}:
    delete:
      description: Sets <code>revoked_at</code> on the share so that all future public
        access attempts return 404. The share record is retained for audit purposes.
        Revocation is permanent.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke a share
      tags:
      - Shares
    get:
      description: Returns the share record including its current status (active,
        revoked, expired).
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a share
      tags:
      - Shares
    put:
      consumes:
      - application/json
      description: 'Updates the share''s label, password, expiry, and permission flags.
        All fields are optional. To remove an existing password send <code>"clear_password":
        true</code>. To remove an expiry send <code>"clear_expiry": true</code>.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateShareRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a share
      tags:
      - Shares
  /api/v1/shares/{id}/comments:
    get:
      description: Returns all comments posted through the share, visible to workspace
        members for moderation. The authenticated user must be a member of the workspace
        that owns the share.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.CommentResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List comments on a share (owner)
      tags:
      - Shares
  /api/v1/shares/{id}/comments/{cid}:
    delete:
      description: Permanently deletes a comment posted on the share. Only workspace
        members can use this endpoint. Use it to moderate inappropriate or spam comments.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Comment ID
        in: path
        name: cid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a comment (owner)
      tags:
      - Shares
  /api/v1/tags:
    delete:
      consumes:
      - application/json
      description: Deletes all listed tags and removes their associations from all
        assets. Tags not found in the workspace are silently skipped. Returns the
        count of tags deleted and the total number of asset-tag associations removed.
      parameters:
      - description: Tag names to delete
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.bulkDeleteTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: deleted and removed_from_assets counts
          schema:
            additionalProperties:
              type: integer
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk delete tags
      tags:
      - Tags
    get:
      description: Returns all tags in the workspace, each with <code>asset_count</code>,
        optional <code>color</code>, <code>group_name</code>, and <code>last_used_at</code>.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.TagResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List tags
      tags:
      - Tags
    post:
      consumes:
      - application/json
      description: Creates a new tag with an optional color (hex) and group name.
        Tag names are case-insensitive and must be unique within the workspace.
      parameters:
      - description: Tag details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createTagRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.TagResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Tag already exists
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a tag
      tags:
      - Tags
  /api/v1/tags/{name}:
    patch:
      consumes:
      - application/json
      description: Updates one or more attributes of an existing tag identified by
        its name. All fields are optional. Renaming checks for conflicts with existing
        tag names.
      parameters:
      - description: Current tag name
        in: path
        name: name
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.patchTagRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TagResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Tag not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Target name already in use
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a tag
      tags:
      - Tags
  /api/v1/tags/merge:
    post:
      consumes:
      - application/json
      description: Reassigns all asset-tag associations from the listed source tags
        to the target tag, then deletes the source tags. The target tag is created
        if it does not already exist. Useful for consolidating duplicate or near-duplicate
        tags.
      parameters:
      - description: Source tag names and target tag name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.mergeTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: merged_assets count and updated target TagResponse
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Merge tags
      tags:
      - Tags
  /api/v1/tags/suggestions/duplicates:
    get:
      description: Returns pairs of tags whose names are similar (Levenshtein distance
        &lt; 30% of the longer name) among tags that have at least one associated
        asset. Up to 20 pairs are returned, sorted by similarity score ascending (most
        similar first). Use the merge endpoint to consolidate them.
      produces:
      - application/json
      responses:
        "200":
          description: Array of {a, b, score} pairs
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get duplicate tag suggestions
      tags:
      - Tags
  /api/v1/workspace:
    post:
      consumes:
      - application/json
      description: Creates a new workspace and makes the authenticated user its owner.
        The user may belong to multiple workspaces; use <code>POST /api/v1/workspace/switch</code>
        to activate a different workspace in subsequent requests.
      parameters:
      - description: Workspace details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateWorkspaceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a workspace
      tags:
      - Workspace
  /api/v1/workspace/invites:
    get:
      description: Returns all workspace invites that have not yet been accepted and
        have not expired. The <code>invite_token</code> field is omitted from list
        responses for security — it is only returned once, when the invite is created.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.InviteResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List pending invites
      tags:
      - Workspace
    post:
      consumes:
      - application/json
      description: Generates a time-limited invite token (7-day expiry) for the given
        email address. The <code>invite_token</code> in the response should be sent
        to the recipient; they redeem it via <code>POST /auth/invite/accept</code>.
        Only workspace owners may create invites.
      parameters:
      - description: Invite details (email and role)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.InviteResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Insufficient role — owner required
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a workspace invite
      tags:
      - Workspace
  /api/v1/workspace/invites/{inviteId}:
    delete:
      description: Cancels a pending invite, preventing the recipient from accepting
        it. Has no effect on already-accepted invites (they are already marked as
        used).
      parameters:
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an invite
      tags:
      - Workspace
  /api/v1/workspace/jobs/{type}/trigger:
    post:
      description: 'Enqueues a background job for the entire workspace. Currently
        supported job types: <ul> <li><strong>extract_exif</strong> — Backfills EXIF
        metadata (make, model, GPS, taken-at, etc.) for all image assets that do not
        yet have the <code>_exif_make</code> custom field populated.</li> </ul> Returns
        the number of assets enqueued for processing.'
      parameters:
      - description: Job type (e.g. extract_exif)
        in: path
        name: type
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: enqueued count
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Unknown job type
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger a workspace-wide background job
      tags:
      - Workspace
  /api/v1/workspace/me:
    get:
      description: Returns the workspace embedded in the auth token, the authenticated
        user's profile, and their membership role in that workspace. Use this endpoint
        on app startup to hydrate the session.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkspaceMeResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Workspace or user not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current workspace context
      tags:
      - Workspace
  /api/v1/workspace/members:
    get:
      description: Returns all members of the workspace embedded in the auth token,
        including their names, emails, roles, and join dates.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.MemberResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workspace members
      tags:
      - Workspace
  /api/v1/workspace/members/{userId}:
    delete:
      description: 'Removes a user from the active workspace. Safeguards: <ul> <li>A
        user cannot remove themselves.</li> <li>The last owner of a workspace cannot
        be removed.</li> </ul>'
      parameters:
      - description: User ID to remove
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Cannot remove yourself or the last owner
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a workspace member
      tags:
      - Workspace
    put:
      consumes:
      - application/json
      description: 'Changes the role (<code>owner</code>, <code>editor</code>, or
        <code>viewer</code>) of a workspace member. Safeguard: the last owner cannot
        demote themselves.'
      parameters:
      - description: User ID whose role to change
        in: path
        name: userId
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateMemberRoleRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Cannot demote the last owner
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a member's role
      tags:
      - Workspace
  /api/v1/workspace/settings:
    put:
      consumes:
      - application/json
      description: 'Updates the workspace''s version retention policy and EXIF metadata
        settings. <ul> <li><strong>version_retention_count</strong>: Maximum number
        of asset versions to keep per asset. 0 = keep all.</li> <li><strong>exif_keep</strong>:
        Whether EXIF metadata is preserved on uploaded images.</li> <li><strong>exif_keep_gps</strong>:
        Whether GPS coordinates are preserved within EXIF data (requires exif_keep=true).</li>
        </ul>'
      parameters:
      - description: Settings to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.UpdateWorkspaceSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkspaceResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Update workspace settings
      tags:
      - Workspace
  /api/v1/workspace/switch:
    post:
      consumes:
      - application/json
      description: Issues a fresh JWT scoped to the requested workspace and updates
        the <code>auth_token</code> cookie accordingly. All subsequent authenticated
        requests will operate in the new workspace context. The user must be a member
        of the target workspace.
      parameters:
      - description: Target workspace ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.SwitchWorkspaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SwitchWorkspaceResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Not a member of this workspace
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Switch active workspace
      tags:
      - Workspace
  /api/v1/workspaces:
    get:
      description: Returns every workspace the authenticated user is a member of,
        along with their role in each. Use this to populate a workspace-switcher UI.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.WorkspaceWithRoleResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workspaces
      tags:
      - Workspace
  /auth/invite/accept:
    post:
      consumes:
      - application/json
      description: 'Redeems a one-time invite token: creates a new user account (name
        + password required) and adds them to the workspace at the role encoded in
        the invite. The invite token is marked as accepted and cannot be reused. Returns
        a JWT just like <code>POST /auth/register</code>.'
      parameters:
      - description: Invite token, name, and password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.AcceptInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "404":
          description: Invalid or expired invite token
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      summary: Accept a workspace invite
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates the user with email and password. Returns a JWT token
        in the response body and sets an <code>auth_token</code> httpOnly cookie (7-day
        expiry). The workspace embedded in the response is the user's first workspace
        — use <code>POST /api/v1/workspace/switch</code> to change it.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      summary: Log in
      tags:
      - Auth
  /auth/logout:
    post:
      description: Clears the <code>auth_token</code> httpOnly cookie by setting it
        to an expired value. No server-side session state is maintained, so this is
        a client-side-only operation.
      produces:
      - application/json
      responses:
        "200":
          description: ok
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Log out
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Reissues a fresh JWT with a new 7-day expiry for the authenticated
        user and workspace. The new token is returned in the response body and also
        set as an updated <code>auth_token</code> cookie. Call this endpoint before
        the current token expires to maintain a session without re-login.
      produces:
      - application/json
      responses:
        "200":
          description: token
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh auth token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with name, email, and password. A default
        workspace is automatically created for the new user. The response includes
        a JWT auth token set as an <code>auth_token</code> httpOnly cookie and also
        returned in the response body.
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /config:
    get:
      description: Returns public feature flags and configuration values that the
        frontend needs before authentication. Currently exposes the <code>demo</code>
        boolean which, when true, puts the server into read-only demonstration mode.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              demo:
                type: boolean
            type: object
      summary: Get server config
      tags:
      - health
  /healthz:
    get:
      consumes:
      - '*/*'
      description: get the status of server.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Show the status of server.
      tags:
      - Health
  /shared/{id}/access:
    get:
      description: Returns the share's label and whether it requires a password. Use
        this as the first call when a visitor lands on a share link — if <code>has_password</code>
        is true, show a password gate before calling <code>POST /shared/:id/access</code>.
        Returns 404 if the share does not exist or has been revoked, and 410 if it
        has expired.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareInfoResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Share has expired
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get share info (public)
      tags:
      - Public Shares
    post:
      consumes:
      - application/json
      description: 'Validates the share (checks password if one is set) and issues
        a 24-hour share session token. Include this token as <code>Authorization:
        Bearer &lt;token&gt;</code> in all subsequent requests to <code>/shared/:id/*</code>
        endpoints. Also increments the share''s view count.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Password (if required)
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.ShareAccessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ShareAccessResponse'
        "401":
          description: Password required or incorrect
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Share has expired
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Authenticate share access (public)
      tags:
      - Public Shares
  /shared/{id}/assets:
    get:
      description: 'Returns all assets accessible through the share, along with share
        metadata (<code>allow_comments</code>, <code>allow_download</code>, etc.).
        The asset set depends on the share''s target type: a single asset for <code>asset</code>
        shares, all project assets for <code>project</code> shares. Requires a valid
        share session token.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: share metadata and assets array
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Not authenticated (share token required)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "410":
          description: Share has expired or been revoked
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List share assets (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}:
    get:
      description: Returns a single asset accessible via the share. Returns 404 if
        the asset is not part of the share's target. Requires a valid share session
        token.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found in this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get share asset (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}/comments:
    get:
      description: Returns all comments posted on a specific asset within the share.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.CommentResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found in this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset comments (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}/file:
    get:
      description: 'Streams the original file for an asset accessible via the share.
        Returns 403 if the share was created with <code>allow_download: false</code>.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Download not allowed for this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download shared asset file (public)
      tags:
      - Public Shares
  /shared/{id}/assets/{aid}/thumb:
    get:
      description: Streams the JPEG thumbnail for an asset accessible via the share.
        Thumbnails are always accessible regardless of the <code>allow_download</code>
        setting, as they are needed for review purposes. Returns 404 if the thumbnail
        has not yet been generated.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Asset ID
        in: path
        name: aid
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found or thumbnail not ready
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get shared asset thumbnail (public)
      tags:
      - Public Shares
  /shared/{id}/comments:
    get:
      description: Returns all comments on the share, grouped by <code>asset_id</code>.
        Useful for rendering a review dashboard showing all feedback at once.
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Array of {asset_id, comments[]} groups
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Share not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List share comments (public)
      tags:
      - Public Shares
    post:
      consumes:
      - application/json
      description: 'Posts a comment on an asset within the share. The share must have
        <code>allow_comments: true</code>. Commenters identify themselves by name;
        an optional email can be provided. Returns 403 if comments are disabled for
        this share.'
      parameters:
      - description: Share ID
        in: path
        name: id
        required: true
        type: string
      - description: Comment content and author info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.CommentResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Comments not allowed for this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found in this share
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Post a comment (public)
      tags:
      - Public Shares
swagger: "2.0"
