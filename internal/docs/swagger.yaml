          $ref: '#/definitions/api.CreateInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.InviteResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Insufficient role — owner required
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
