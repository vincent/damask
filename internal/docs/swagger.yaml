      - application/zip
      responses:
        "200":
          description: ZIP archive
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: One or more assets not in workspace
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Export stack as ZIP
      tags:
      - Stack
  /api/v1/stack/merge:
    post:
      consumes:
      - application/json
      description: Enqueues an async job that merges the given assets into a single
        animated GIF or PDF contact sheet. All assets must belong to the authenticated
        workspace. Returns 202 immediately with a <code>job_id</code>; listen for
        event <code>stack_merge_done</code> to check completion. On success the job
        result contains the new asset ID.
      parameters:
      - description: Asset IDs, output type and options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.stackMergeRequest'
      produces:
      - application/json
      responses:
        "202":
          description: job_id
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: One or more assets not in workspace
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Validation failed (e.g. output_type not gif/pdf)
          schema:
            $ref: '#/definitions/api.ValidationErrorResponse'
      security:
      - BearerAuth: []
      summary: Merge stack assets into GIF or PDF
      tags:
      - Stack
