  /api/v1/assets/{id}/fields:
    get:
      description: 'Returns all custom field values set on the asset, including fields
        for which no value has been set yet (those have <code>value: null</code>).
        Each entry includes the field definition metadata (<code>key</code>, <code>name</code>,
        <code>field_type</code>) alongside the typed value. The <code>definition_deleted</code>
        flag indicates the field definition was soft-deleted — the value is still
        stored but the field is no longer active.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetAssetFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get asset field values
      tags:
      - Custom Fields
    patch:
      consumes:
      - application/json
      description: 'Sets or clears one or more custom field values on the asset. Each
        entry in the <code>values</code> array targets a field by <code>field_id</code>.
        To clear a value, pass <code>null</code> as the value. All values are validated
        before any writes.<br><br> Value types must match the field definition''s
        <code>field_type</code>: <ul> <li><strong>text / url</strong> — string</li>
        <li><strong>number</strong> — number</li> <li><strong>date</strong> — string
        in <code>YYYY-MM-DD</code> format</li> <li><strong>boolean</strong> — boolean</li>
        <li><strong>select</strong> — string matching one of the field''s defined
        options</li> </ul> Returns the full updated field values for the asset.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Field values to set
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.PatchAssetFieldsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetAssetFieldsResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Value validation failed
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update asset field values
      tags:
      - Custom Fields
  /api/v1/assets/{id}/file:
    get:
      description: Streams the raw file bytes of the asset's current version. The
        response Content-Type matches the asset's MIME type and Content-Disposition
        is set to <code>inline</code> with the original filename. An <code>asset_downloaded</code>
        audit event is recorded (browser image prefetch requests are excluded).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Download asset file
      tags:
      - Assets
  /api/v1/assets/{id}/preview:
    get:
      description: 'Applies a resize/format transform to the asset''s current version
        in memory and returns the result directly (never stored). Responses are cached
        in an LRU cache (100 entries, 5-minute TTL) so repeated identical calls are
        cheap. <br>Query parameters: <ul> <li><strong>w</strong> — Target width in
        pixels</li> <li><strong>h</strong> — Target height in pixels</li> <li><strong>fit</strong>
        — Fit mode: <code>contain</code> (default), <code>cover</code>, <code>fill</code></li>
        <li><strong>format</strong> — Output format: <code>jpeg</code> (default),
        <code>png</code>, <code>webp</code> (lossless)</li> <li><strong>q</strong>
        — JPEG quality 1–100 (default: encoder default; ignored for WebP)</li> </ul>
        Only supported for image assets. Returns 400 for video, audio, or PDF assets.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Target width
        in: query
        name: w
        type: integer
      - description: Target height
        in: query
        name: h
        type: integer
      - description: Fit mode (contain|cover|fill)
        in: query
        name: fit
        type: string
      - description: Output format (jpeg|png|webp)
        in: query
        name: format
        type: string
      - description: JPEG quality (1-100, ignored for WebP)
        in: query
        name: q
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Preview only supported for images
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Preview image transform
      tags:
      - Variants
