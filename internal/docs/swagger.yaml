    post:
      consumes:
      - application/json
      description: Streams a ZIP archive containing the original files for the given
        asset IDs. All assets must belong to the authenticated workspace. Files are
        named after their original filenames; duplicates are suffixed with <code>_N</code>.
        If any file is missing from storage it is skipped and listed in a <code>_missing_files.txt</code>
        manifest inside the ZIP. The response is streamed — do not buffer the entire
        body before processing.
      parameters:
      - description: Asset IDs and optional filename
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.stackExportRequest'
