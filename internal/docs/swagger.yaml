info:
  contact: {}
paths:
  /api/v1/activity:
    get:
      description: Returns a unified, cursor-paginated activity feed combining asset
        and project events.
      parameters:
      - description: Page size (1–100, default 20)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      - description: Filter by actor user ID
        in: query
        name: user_id
        type: string
      - description: Comma-separated event type filter
        in: query
        name: types
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ActivityFeedResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List workspace activity
      tags:
      - Audit
  /api/v1/activity/export:
    get:
      description: Exports up to 10,000 workspace audit events as a CSV download.
      parameters:
      - description: Start date filter (YYYY-MM-DD)
        in: query
        name: since
        type: string
      - description: End date filter (YYYY-MM-DD)
        in: query
        name: until
        type: string
      - description: Export format (only csv supported)
        in: query
        name: format
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Invalid date format or unsupported format
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Export workspace activity
      tags:
      - Audit
  /api/v1/admin/telemetry:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TelemetryStatusResponse'
      security:
      - BearerAuth: []
      summary: Get telemetry status
      tags:
      - Admin
  /api/v1/aiproviders:
    get:
      description: Returns all supported AI providers and their configuration status
        for the current workspace, including available models and capabilities.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AIProvidersListResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List AI providers
      tags:
      - AIProviders
  /api/v1/assets:
    get:
      description: 'Returns a paginated list of assets. The behaviour is controlled
        by query parameters: <ul> <li><strong>q</strong> — Full-text search across
        filenames and custom field text values.</li> <li><strong>tags</strong> — Comma-separated
        tag names. Returns only assets that have ALL listed tags (AND logic).</li>
        <li><strong>folder_id</strong> — Filter by folder. Use <code>root</code> to
        list assets with no folder in a project.</li> <li><strong>project_id</strong>
        — Filter by project (required when folder_id=root).</li> <li><strong>mime</strong>
        — Filter by MIME type prefix (e.g. <code>image/</code> or <code>video/mp4</code>).</li>
        <li><strong>sort</strong> — Sort order: <code>created_at_desc</code> (default),
        <code>created_at_asc</code>, <code>size_asc</code>, <code>size_desc</code>,
        <code>id_asc</code>, <code>id_desc</code>, <code>taken_at</code>, <code>taken_at_desc</code>.</li>
        <li><strong>limit</strong> — Page size, 1–100 (default 50).</li> <li><strong>cursor</strong>
        — Opaque cursor from the previous page''s <code>next_cursor</code> field.</li>
        <li><strong>field[key]</strong> — Filter by custom field value, e.g. <code>field[status]=published</code>.</li>
        </ul>'
      parameters:
      - description: Full-text search query
        in: query
        name: q
        type: string
      - description: Comma-separated tag names (AND filter)
        in: query
        name: tags
        type: string
      - description: Folder ID (use 'root' for unfoldered assets in a project)
        in: query
        name: folder_id
        type: string
      - description: Project ID
        in: query
        name: project_id
        type: string
      - description: MIME type prefix filter
        in: query
        name: mime
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Page size (1-100, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AssetListResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List assets
      tags:
      - Assets
    post:
      consumes:
      - multipart/form-data
      description: 'Uploads a file as a new asset in the workspace. The request must
        be a multipart form with a <code>file</code> field. Optional form fields:
        <ul> <li><strong>project_id</strong> — assign the asset to a project on creation.</li>
        <li><strong>folder_id</strong> — assign the asset to a folder on creation.</li>
        </ul> On success a thumbnail generation job is enqueued automatically. An
        <code>asset_created</code> audit event is written and custom fields are inherited
        from the project if applicable.'
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      - description: Project ID
        in: formData
        name: project_id
        type: string
      - description: Folder ID
        in: formData
        name: folder_id
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.AssetResponse'
        "400":
          description: file field is required
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload an asset
      tags:
      - Assets
  /api/v1/assets/{id}:
    delete:
      description: Permanently deletes the asset record, its storage file, and its
        thumbnail. All associated variants, versions, tags, and field values are also
        removed via cascade. This action cannot be undone.
