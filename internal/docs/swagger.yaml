  /api/v1/assets/{id}/versions:
    get:
      description: 'Returns all versions of an asset in reverse chronological order.
        Each version includes its <code>version_num</code>, MIME type, dimensions,
        file size, optional comment, and the number of variants derived from it (<code>variant_count</code>).
        The current version has <code>is_current: true</code>.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.VersionResponse'
            type: array
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List asset versions
      tags:
      - Versions
    post:
      consumes:
      - multipart/form-data
      description: 'Uploads a new file as the next version of an existing asset. The
        new version is immediately promoted to current. The previous current version
        is retained in history.<br><br> After upload, the server: <ul> <li>Enqueues
        a thumbnail generation job for the new version.</li> <li>Enqueues a variant
        rebuild job that recreates all variants from the previous current version.</li>
        <li>Clears the asset''s cached thumbnail (pending the new job).</li> </ul>
        If the uploaded file is byte-for-byte identical to the current version (same
        content hash), the request is rejected with 409 to prevent no-op versions.<br><br>
        The response body contains both the new <code>version</code> object and the
        updated <code>asset</code> object.'
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: New version file
        in: formData
        name: file
        required: true
        type: file
      - description: Optional change note (max 500 characters)
        in: formData
        name: comment
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.VersionWithAssetResponse'
        "400":
          description: Missing file field
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: File is identical to the current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Comment too long
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a new version
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}:
    delete:
      description: Soft-deletes an asset version. The current version cannot be deleted
        — restore a different version first, then delete the old one. A version also
        cannot be deleted while it is in use as a project cover or workspace icon
        (returns 409).<br><br> Soft deletion marks the row as deleted; the storage
        file is not immediately removed (physical cleanup is handled by a background
        retention job).
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or version not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Version is in use as a cover/icon
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot delete the current version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a version
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}/file:
    get:
      description: Streams the raw file for the specified version. The response MIME
        type and <code>Content-Disposition</code> are set from the stored version
        metadata.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset, version, or file not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get version file
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}/restore:
    post:
      description: Promotes a non-current version to be the current version of the
        asset. The asset's thumbnail is also updated to match the restored version.
        An audit event records the version numbers rolled back from and to.<br><br>
        Returns 409 if the requested version is already current. Returns 422 if the
        version has been soft-deleted. The response contains the updated <code>version</code>
        and <code>asset</code>.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID to restore
        in: path
        name: vid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.VersionWithAssetResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Asset or version not found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "409":
          description: Version is already current
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "422":
          description: Cannot restore a deleted version
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Restore a version
      tags:
      - Versions
  /api/v1/assets/{id}/versions/{vid}/thumb:
    get:
      description: Returns the JPEG thumbnail for the given version. Returns 404 if
        the thumbnail has not yet been generated (the job runs asynchronously after
        upload — poll until the <code>thumbnail_url</code> field in the version response
        is non-null).
      parameters:
