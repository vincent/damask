<body style="margin:0;padding:0;background-color:#f8f8f9;-webkit-text-size-adjust:none;text-size-adjust:none">
    <div style="width: 1000px; margin:0 auto;">

        <!-- Header accent -->
        <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#615fff">
            <tr><td style="height:4px;font-size:1px;line-height:1px"> </td></tr>
        </table>

        <!-- Logo -->
        <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#fff">
            <tr>
            <td align="center" style="padding:22px 40px 25px;font-family:Montserrat,Trebuchet MS,Tahoma,sans-serif;font-size:18px;font-weight:700;letter-spacing:4px;color:#2b303a">
                DAMASK
            </td>
            </tr>
        </table>

        <!-- Body -->
        <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#fff">
            <tr>
            <td align="center" style="padding:60px 40px 12px">
                <!-- Title -->
                <p style="margin:0 0 16px;font-family:Montserrat,Trebuchet MS,Tahoma,sans-serif;font-size:30px;font-weight:700;color:#2b303a;line-height:1.2">{{.Title}}</p>
                <!-- Body text -->
                <p style="margin:0 0 30px;font-family:Montserrat,Trebuchet MS,Tahoma,sans-serif;font-size:15px;color:#808389;line-height:1.5">{{.Text}}</p>
                <!-- CTA button -->
                <!--[if mso]><v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" style="height:52px;width:189px;v-text-anchor:middle;" arcsize="97%" stroke="false" fillcolor="#615fff"><w:anchorlock/><v:textbox inset="0px,0px,0px,0px"><center style="color:#fff;font-family:Tahoma,sans-serif;font-size:16px;font-weight:bold"><![endif]-->
                <a href="{{.ActionURL}}" style="display:inline-block;padding:15px 30px;background-color:#615fff;color:#fff;font-family:Montserrat,Trebuchet MS,Tahoma,sans-serif;font-size:16px;font-weight:700;text-decoration:none;border-radius:60px;letter-spacing:normal">{{.ActionText}}</a>
                <!--[if mso]></center></v:textbox></v:roundrect><![endif]-->
            </td>
            </tr>
            <tr><td style="height:60px;font-size:1px;line-height:1px"> </td></tr>
        </table>

        <!-- Footer -->
        <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#2b303a">
            <tr><td style="height:4px;background-color:#615fff;font-size:1px;line-height:1px"> </td></tr>
            <tr>
            <td style="padding:20px 40px 10px;font-family:Montserrat,Trebuchet MS,Tahoma,sans-serif;font-size:12px;color:#95979c;line-height:1.5">
                {{.FooterText}}
            </td>
            </tr>
            <tr>
            <td style="padding:0 40px 10px">
                <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                <tr><td style="border-top:1px solid #b5b7bc;font-size:1px;line-height:1px"> </td></tr>
                </table>
            </td>
            </tr>
            <tr>
            <td style="padding:10px 40px 30px;font-family:Montserrat,Trebuchet MS,Tahoma,sans-serif;font-size:12px;color:#95979c">
                <a style="color: inherit;text-decoration: none;" href="{{.BaseUrl}}">Damask</a>
            </td>
            </tr>
        </table>
    </div>
</body>
