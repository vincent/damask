{{template "base" .}}

{{define "headline"}}
<h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:38px;font-weight:400;line-height:1.2;color:#3a3228;text-align:center;">
  <em style="font-style:italic;">New comment</em><br>on your shared link.
</h1>
{{end}}

{{define "body_text"}}
<p style="margin:0 0 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:400;line-height:1.65;color:#5a4e44;text-align:center;">
  <strong style="color:#3a3228;font-weight:600;">{{.AuthorName}}</strong> commented on
  <strong style="color:#3a3228;font-weight:600;">{{.ShareLabel}}</strong>.
</p>
<!-- Comment bubble -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td style="background-color:#ede8dc;border-left:3px solid #c8b99a;padding:16px 20px;border-radius:2px;">
      <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:14.5px;font-style:italic;color:#5a4e44;line-height:1.65;">&ldquo;{{.CommentBody}}&rdquo;</p>
      <p style="margin:8px 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;color:#a0907e;letter-spacing:0.05em;">— {{.AuthorName}}</p>
    </td>
  </tr>
</table>
{{end}}

{{define "cta"}}
<a href="{{.ShareURL}}" style="display:inline-block;background-color:rgb(15, 23, 38);color:#f4efe4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.04em;text-decoration:none;padding:14px 36px;border-radius:2px;">View shared asset</a>
{{end}}
